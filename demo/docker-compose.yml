services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraiseql_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d fraiseql_demo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  fraiseql:
    image: fraiseql/fraiseql:latest
    command: ["fraiseql", "run", "--read-only"]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://demo:demo@db:5432/fraiseql_demo
    volumes:
      - ./fraiseql.toml:/app/fraiseql.toml:ro
      - ./schema.py:/app/schema.py:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
