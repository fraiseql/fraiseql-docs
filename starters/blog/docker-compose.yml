services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       blog
      POSTGRES_USER:     blog
      POSTGRES_PASSWORD: blog
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD", "pg_isready", "-U", "blog"]
      interval: 5s
      timeout:  5s
      retries:  5

  fraiseql:
    image: fraiseql/fraiseql:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://blog:blog@db:5432/blog
    depends_on:
      db:
        condition: service_healthy
    command: fraiseql run

volumes:
  pgdata:
