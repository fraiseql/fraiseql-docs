[project]
name    = "blog"
version = "0.1.0"
description = "A blog API built with FraiseQL"
database_target = "postgresql"

[database]
url      = "${DATABASE_URL}"
pool_min = 5
pool_max = 20
ssl_mode = "prefer"

[server]
host = "0.0.0.0"
port = 8080

[server.cors]
origins     = ["http://localhost:3000"]
credentials = true

[fraiseql]
schema_file = "schema.json"
output_file = "schema.compiled.json"

[security]
default_policy = "authenticated"

[security.rate_limiting]
enabled             = true
requests_per_second = 100
burst_size          = 200

[security.enterprise]
audit_logging_enabled = true
audit_log_level       = "info"
