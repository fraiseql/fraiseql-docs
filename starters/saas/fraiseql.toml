[project]
name        = "saas"
version     = "0.1.0"
description = "A SaaS platform API built with FraiseQL"
database_target = "postgresql"

[database]
url               = "${DATABASE_URL}"
pool_min          = 10
pool_max          = 50
connect_timeout_ms = 5000
idle_timeout_ms   = 600000
ssl_mode          = "require"

[server]
host               = "0.0.0.0"
port               = 8080
request_timeout_ms = 30000

[server.cors]
origins     = ["${APP_URL:-http://localhost:3000}"]
credentials = true

[fraiseql]
schema_file = "schema.json"
output_file = "schema.compiled.json"

[security]
default_policy = "authenticated"

[security.rate_limiting]
enabled             = true
requests_per_second = 50
burst_size          = 100

[security.enterprise]
audit_logging_enabled = true
audit_log_level       = "info"

[security.error_sanitization]
enabled                     = true
hide_implementation_details = true
sanitize_database_errors    = true
