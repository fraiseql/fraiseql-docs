[project]
name    = "minimal"
version = "0.1.0"
description = "A minimal FraiseQL project"
database_target = "sqlite"

[database]
url = "${DATABASE_URL:-sqlite://./dev.db}"

[server]
host = "127.0.0.1"
port = 8080

[fraiseql]
schema_file = "schema.json"
output_file = "schema.compiled.json"

[security.rate_limiting]
enabled             = true
requests_per_second = 100
burst_size          = 200

[security.enterprise]
audit_logging_enabled = true
audit_log_level       = "info"
