<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#f25c66"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.05)"/>

  <!-- Main content card -->
  <rect x="80" y="100" width="1040" height="430" rx="24" fill="url(#cardGrad)" opacity="0.95"/>

  <!-- Strawberry emoji (larger) -->
  <text x="160" y="200" font-size="72">🍓</text>

  <!-- Logo text -->
  <text x="250" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#ffffff">
    FraiseQL
  </text>

  <!-- Tagline -->
  <text x="160" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" fill="#e63946" font-weight="600">
    GraphQL for the LLM Era. Simple. Powerful. Rust-Fast.
  </text>

  <!-- Code preview box -->
  <rect x="160" y="290" width="440" height="180" rx="12" fill="#1E1E1E"/>
  <text x="180" y="320" font-family="'Fira Code', monospace" font-size="14" fill="#9CA3AF">GraphQL Query</text>
  <text x="180" y="355" font-family="'Fira Code', monospace" font-size="16" fill="#E5E7EB">{ users { id name</text>
  <text x="180" y="380" font-family="'Fira Code', monospace" font-size="16" fill="#E5E7EB">    posts { title } } }</text>
  <text x="180" y="430" font-family="'Fira Code', monospace" font-size="14" fill="#e63946">→ One SQL Query</text>
  <text x="180" y="455" font-family="'Fira Code', monospace" font-size="14" fill="#888888">No N+1 • Rust Pipeline • 7-10x Faster</text>

  <!-- Feature badges on right side -->
  <g transform="translate(660, 300)">
    <rect width="380" height="50" rx="8" fill="rgba(230, 57, 70, 0.2)"/>
    <text x="20" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#fff" font-weight="600">⚡ Rust Pipeline — 7-10x Faster JSON</text>
  </g>

  <g transform="translate(660, 365)">
    <rect width="380" height="50" rx="8" fill="rgba(230, 57, 70, 0.2)"/>
    <text x="20" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#fff" font-weight="600">🔍 pgvector — Native Vector Search</text>
  </g>

  <g transform="translate(660, 430)">
    <rect width="380" height="50" rx="8" fill="rgba(230, 57, 70, 0.2)"/>
    <text x="20" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#fff" font-weight="600">🛡️ Secure — No SQL Injection</text>
  </g>

  <!-- URL at bottom -->
  <text x="600" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">
    fraiseql.dev
  </text>
</svg>
