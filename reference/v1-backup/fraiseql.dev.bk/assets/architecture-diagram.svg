<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#f25c66"/>
    </linearGradient>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DEA584"/>
      <stop offset="100%" style="stop-color:#B7410E"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#336791"/>
      <stop offset="100%" style="stop-color:#264d73"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d3d"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e63946"/>
    </marker>
  </defs>

  <style>
    .box { filter: url(#shadow); }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .title { font-size: 16px; font-weight: 600; fill: #ffffff; }
    .subtitle { font-size: 13px; fill: #cccccc; }
    .label { font-size: 11px; fill: #888888; }
    .arrow { stroke: #e63946; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-dashed { stroke: #666; stroke-width: 1.5; stroke-dasharray: 5,5; fill: none; }
    .perf-text { font-size: 11px; font-weight: 600; fill: #e63946; }
  </style>

  <!-- GraphQL Client -->
  <g class="box">
    <rect x="30" y="160" width="140" height="100" rx="12" fill="url(#darkGrad)" stroke="#555" stroke-width="1"/>
    <text class="text title" x="100" y="200" text-anchor="middle">GraphQL</text>
    <text class="text title" x="100" y="220" text-anchor="middle">Client</text>
    <text class="text subtitle" x="100" y="245" text-anchor="middle">React / Vue / Mobile</text>
  </g>

  <!-- FraiseQL Engine -->
  <g class="box">
    <rect x="230" y="60" width="200" height="300" rx="12" fill="url(#primaryGrad)"/>
    <text class="text title" x="330" y="95" text-anchor="middle">FraiseQL</text>

    <!-- Components inside -->
    <rect x="250" y="115" width="160" height="45" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text class="text" style="font-size:13px;fill:#fff" x="330" y="143" text-anchor="middle">GraphQL Parser</text>

    <rect x="250" y="175" width="160" height="45" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text class="text" style="font-size:13px;fill:#fff" x="330" y="203" text-anchor="middle">SQL Generator</text>

    <rect x="250" y="235" width="160" height="45" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text class="text" style="font-size:13px;fill:#fff" x="330" y="263" text-anchor="middle">TurboRouter (APQ)</text>

    <rect x="250" y="295" width="160" height="45" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text class="text" style="font-size:13px;fill:#fff" x="330" y="323" text-anchor="middle">Type Resolver</text>
  </g>

  <!-- Rust Pipeline - Key differentiator -->
  <g class="box">
    <rect x="490" y="140" width="160" height="140" rx="12" fill="url(#rustGrad)"/>
    <text class="text title" x="570" y="180" text-anchor="middle">Rust Pipeline</text>
    <text class="text" style="font-size:12px;fill:#fff" x="570" y="205" text-anchor="middle">Zero-Copy JSON</text>
    <text class="text" style="font-size:12px;fill:#fff" x="570" y="225" text-anchor="middle">7-10x Faster</text>
    <text class="text" style="font-size:12px;fill:#fff" x="570" y="250" text-anchor="middle">No GIL</text>
  </g>

  <!-- PostgreSQL -->
  <g class="box">
    <rect x="710" y="140" width="160" height="140" rx="12" fill="url(#pgGrad)"/>
    <text class="text title" x="790" y="185" text-anchor="middle">PostgreSQL</text>
    <text class="text" style="font-size:12px;fill:#b8d4e8" x="790" y="210" text-anchor="middle">JSONB + Views</text>
    <text class="text" style="font-size:12px;fill:#b8d4e8" x="790" y="230" text-anchor="middle">pgvector</text>
    <text class="text" style="font-size:12px;fill:#b8d4e8" x="790" y="250" text-anchor="middle">Functions</text>
  </g>

  <!-- Arrows with labels -->
  <path class="arrow" d="M 170 210 L 225 210"/>
  <text class="label" x="197" y="200" text-anchor="middle">Query</text>

  <path class="arrow" d="M 430 210 L 485 210"/>
  <text class="label" x="457" y="200" text-anchor="middle">SQL</text>

  <path class="arrow" d="M 650 210 L 705 210"/>
  <text class="label" x="677" y="200" text-anchor="middle">JSONB</text>

  <!-- Performance highlights -->
  <rect x="250" y="390" width="420" height="40" rx="8" fill="#1a1a1a"/>
  <text class="text" style="font-size:13px;fill:#888" x="460" y="415" text-anchor="middle">
    Single Query  •  No N+1  •  Direct JSONB  •  Compiled Speed
  </text>

  <!-- Performance callout -->
  <rect x="490" y="55" width="160" height="30" rx="6" fill="#1a1a1a" stroke="#e63946" stroke-width="1"/>
  <text class="perf-text" x="570" y="75" text-anchor="middle">Key Differentiator</text>
</svg>
