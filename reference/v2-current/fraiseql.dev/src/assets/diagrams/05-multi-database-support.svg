<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">
    One Schema → Four SQL Databases
  </text>

  <!-- Central Input -->
  <rect x="300" y="60" width="200" height="80" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">
    schema.compiled.json
  </text>
  <text x="400" y="110" text-anchor="middle" font-size="11" fill="#666">
    Database-agnostic schema
  </text>
  <text x="400" y="125" text-anchor="middle" font-size="11" fill="#666">
    Type definitions + operators
  </text>

  <!-- Output Arrow -->
  <line x1="400" y1="140" x2="400" y2="180" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- SQL Generators -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#7c3aed"/>
    </marker>
    <marker id="arrowPg" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#2563eb"/>
    </marker>
    <marker id="arrowMy" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#059669"/>
    </marker>
    <marker id="arrowSq" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#d97706"/>
    </marker>
    <marker id="arrowMs" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#ca8a04"/>
    </marker>
  </defs>

  <text x="400" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">
    SQL Generation Layer
  </text>

  <!-- PostgreSQL -->
  <g>
    <line x1="320" y1="190" x2="120" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowPg)"/>
    <rect x="30" y="280" width="180" height="120" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="120" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">PostgreSQL</text>
    <text x="120" y="325" text-anchor="middle" font-size="10" fill="#1e3a8a">150+ operators</text>
    <text x="120" y="340" text-anchor="middle" font-size="10" fill="#1e3a8a">Full-text search</text>
    <text x="120" y="355" text-anchor="middle" font-size="10" fill="#1e3a8a">JSON functions</text>
    <text x="120" y="370" text-anchor="middle" font-size="10" fill="#1e3a8a">Window functions</text>
  </g>

  <!-- MySQL -->
  <g>
    <line x1="370" y1="190" x2="330" y2="280" stroke="#059669" stroke-width="2" marker-end="url(#arrowMy)"/>
    <rect x="240" y="280" width="180" height="120" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="330" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">MySQL</text>
    <text x="330" y="325" text-anchor="middle" font-size="10" fill="#064e3b">80+ operators</text>
    <text x="330" y="340" text-anchor="middle" font-size="10" fill="#064e3b">JSON functions</text>
    <text x="330" y="355" text-anchor="middle" font-size="10" fill="#064e3b">Window functions</text>
    <text x="330" y="370" text-anchor="middle" font-size="10" fill="#064e3b">Generated columns</text>
  </g>

  <!-- SQLite -->
  <g>
    <line x1="430" y1="190" x2="470" y2="280" stroke="#d97706" stroke-width="2" marker-end="url(#arrowSq)"/>
    <rect x="380" y="280" width="180" height="120" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="470" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">SQLite</text>
    <text x="470" y="325" text-anchor="middle" font-size="10" fill="#78350f">40+ operators</text>
    <text x="470" y="340" text-anchor="middle" font-size="10" fill="#78350f">JSON functions</text>
    <text x="470" y="355" text-anchor="middle" font-size="10" fill="#78350f">Basic window</text>
    <text x="470" y="370" text-anchor="middle" font-size="10" fill="#78350f">Dev & testing</text>
  </g>

  <!-- SQL Server -->
  <g>
    <line x1="480" y1="190" x2="650" y2="280" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrowMs)"/>
    <rect x="560" y="280" width="180" height="120" rx="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
    <text x="650" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">SQL Server</text>
    <text x="650" y="325" text-anchor="middle" font-size="10" fill="#713f12">90+ operators</text>
    <text x="650" y="340" text-anchor="middle" font-size="10" fill="#713f12">Full-text search</text>
    <text x="650" y="355" text-anchor="middle" font-size="10" fill="#713f12">JSON functions</text>
    <text x="650" y="370" text-anchor="middle" font-size="10" fill="#713f12">Enterprise support</text>
  </g>

  <!-- Bottom Text -->
  <text x="400" y="430" text-anchor="middle" font-size="11" fill="#666">
    One FraiseQL schema compiles to database-specific SQL with optimal performance for each platform
  </text>
</svg>
