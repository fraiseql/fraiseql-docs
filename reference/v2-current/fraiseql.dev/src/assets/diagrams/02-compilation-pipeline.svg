<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stage-box { fill: white; stroke: #e63946; stroke-width: 2; }
      .stage-title { font-size: 16px; font-weight: bold; fill: #e63946; }
      .stage-text { font-size: 12px; fill: #333; }
      .arrow { stroke: #e63946; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-size: 11px; fill: #666; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#e63946"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    FraiseQL Compilation Pipeline
  </text>

  <!-- Stage 1: Authoring -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="140" height="100" rx="8" class="stage-box"/>
    <text x="70" y="25" text-anchor="middle" class="stage-title">Stage 1</text>
    <text x="70" y="45" text-anchor="middle" class="stage-title" font-size="14">Authoring</text>
    <text x="70" y="65" text-anchor="middle" class="stage-text">Python/TypeScript</text>
    <text x="70" y="80" text-anchor="middle" class="stage-text">schema decorators</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 190,130 L 240,130" class="arrow"/>
  <text x="215" y="120" text-anchor="middle" class="label">schema.json</text>

  <!-- Stage 2: Compilation -->
  <g transform="translate(240, 80)">
    <rect x="0" y="0" width="140" height="100" rx="8" class="stage-box"/>
    <text x="70" y="25" text-anchor="middle" class="stage-title">Stage 2</text>
    <text x="70" y="45" text-anchor="middle" class="stage-title" font-size="14">Compilation</text>
    <text x="70" y="65" text-anchor="middle" class="stage-text">Rust compiler</text>
    <text x="70" y="80" text-anchor="middle" class="stage-text">validation & optimization</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 380,130 L 430,130" class="arrow"/>
  <text x="405" y="120" text-anchor="middle" class="label">schema.compiled.json</text>

  <!-- Stage 3: Runtime -->
  <g transform="translate(430, 80)">
    <rect x="0" y="0" width="140" height="100" rx="8" class="stage-box"/>
    <text x="70" y="25" text-anchor="middle" class="stage-title">Stage 3</text>
    <text x="70" y="45" text-anchor="middle" class="stage-title" font-size="14">Runtime</text>
    <text x="70" y="65" text-anchor="middle" class="stage-text">Pure Rust server</text>
    <text x="70" y="80" text-anchor="middle" class="stage-text">deterministic execution</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 570,130 L 620,130" class="arrow"/>
  <text x="595" y="120" text-anchor="middle" class="label">GraphQL queries</text>

  <!-- Final Output -->
  <g transform="translate(620, 80)">
    <rect x="0" y="0" width="140" height="100" rx="8" class="stage-box"/>
    <text x="70" y="35" text-anchor="middle" class="stage-title" font-size="14">Results</text>
    <text x="70" y="60" text-anchor="middle" class="stage-text">JSON or</text>
    <text x="70" y="75" text-anchor="middle" class="stage-text">Arrow Flight</text>
  </g>

  <!-- Boundary Line -->
  <line x1="225" y1="45" x2="225" y2="185" stroke="#ddd" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="225" y="35" text-anchor="middle" font-size="11" fill="#999" font-weight="bold">Build Time</text>

  <line x1="415" y1="45" x2="415" y2="185" stroke="#ddd" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="415" y="35" text-anchor="middle" font-size="11" fill="#999" font-weight="bold">Compile Time</text>

  <!-- Benefits Section -->
  <g transform="translate(50, 210)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#e63946">Key Benefits:</text>

    <g transform="translate(0, 25)">
      <circle cx="6" cy="6" r="4" fill="#e63946"/>
      <text x="20" y="10" font-size="11" fill="#333">Type Safety: All GraphQL types verified at compile time</text>
    </g>

    <g transform="translate(0, 45)">
      <circle cx="6" cy="6" r="4" fill="#e63946"/>
      <text x="20" y="10" font-size="11" fill="#333">Determinism: Fixed execution paths, no runtime surprises</text>
    </g>

    <g transform="translate(0, 65)">
      <circle cx="6" cy="6" r="4" fill="#e63946"/>
      <text x="20" y="10" font-size="11" fill="#333">Performance: Pre-computed SQL, zero N+1 queries</text>
    </g>

    <g transform="translate(0, 85)">
      <circle cx="6" cy="6" r="4" fill="#e63946"/>
      <text x="20" y="10" font-size="11" fill="#333">Multi-Database: One schema → PostgreSQL, MySQL, SQLite, SQL Server</text>
    </g>
  </g>

  <g transform="translate(450, 210)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#666">vs Traditional Runtime:</text>

    <g transform="translate(0, 25)">
      <text x="0" y="10" font-size="11" fill="#999">❌ Per-query parsing and planning</text>
    </g>

    <g transform="translate(0, 45)">
      <text x="0" y="10" font-size="11" fill="#999">❌ Resolver chains with N+1 risk</text>
    </g>

    <g transform="translate(0, 65)">
      <text x="0" y="10" font-size="11" fill="#999">❌ Scattered authorization logic</text>
    </g>

    <g transform="translate(0, 85)">
      <text x="0" y="10" font-size="11" fill="#999">❌ Unpredictable performance</text>
    </g>
  </g>
</svg>
