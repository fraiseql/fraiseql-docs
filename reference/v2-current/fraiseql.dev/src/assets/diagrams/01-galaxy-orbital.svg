<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" class="galaxy-diagram">
  <!-- Background -->
  <defs>
    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fdf2f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="600" height="600" fill="url(#galaxyGradient)"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    FraiseQL Galaxy
  </text>

  <!-- Center: PostgreSQL Database -->
  <circle cx="300" cy="300" r="35" fill="#e63946" opacity="0.9"/>
  <text x="300" y="300" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="bold" fill="white">
    PostgreSQL
  </text>
  <text x="300" y="318" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="white" opacity="0.9">
    Source of Truth
  </text>

  <!-- Inner Orbit Circle -->
  <circle cx="300" cy="300" r="110" fill="none" stroke="#e63946" stroke-width="2" stroke-dasharray="5,5" opacity="0.3"/>
  <text x="445" y="295" font-size="11" fill="#d62830" opacity="0.6" font-weight="bold">Inner Orbit</text>

  <!-- Inner Orbit Tools (7-10× faster) -->
  <g>
    <!-- fraiseql (right) -->
    <circle cx="410" cy="300" r="20" fill="#e63946" opacity="0.8"/>
    <text x="410" y="302" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="bold" fill="white">f</text>
    <text x="410" y="330" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#333" font-weight="bold">fraiseql</text>
    <text x="410" y="342" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#666">7-10×</text>
  </g>

  <!-- fraiseql-wire (top) -->
  <g>
    <circle cx="300" cy="190" r="20" fill="#e63946" opacity="0.8"/>
    <text x="300" y="192" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="bold" fill="white">w</text>
    <text x="300" y="220" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#333" font-weight="bold">wire</text>
    <text x="300" y="232" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#c41f26" font-weight="bold">200K×</text>
  </g>

  <!-- confiture (bottom) -->
  <g>
    <circle cx="300" cy="410" r="20" fill="#e63946" opacity="0.8"/>
    <text x="300" y="412" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="bold" fill="white">c</text>
    <text x="300" y="440" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#333" font-weight="bold">confiture</text>
    <text x="300" y="452" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#666">600×</text>
  </g>

  <!-- Mid Orbit Circle -->
  <circle cx="300" cy="300" r="180" fill="none" stroke="#ed7a92" stroke-width="2" stroke-dasharray="5,5" opacity="0.3"/>
  <text x="470" y="295" font-size="11" fill="#ed7a92" opacity="0.6" font-weight="bold">Mid Orbit</text>

  <!-- Mid Orbit Tools (300×-2,083×) -->
  <g>
    <!-- pg_tviews (right-upper) -->
    <circle cx="470" cy="240" r="18" fill="#ed7a92" opacity="0.7"/>
    <text x="470" y="242" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="bold" fill="white">tv</text>
    <text x="470" y="265" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#333">tviews</text>
    <text x="470" y="275" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="#c41f26" font-weight="bold">2,083×</text>
  </g>

  <!-- jsonb_delta (right-lower) -->
  <g>
    <circle cx="470" cy="360" r="18" fill="#ed7a92" opacity="0.7"/>
    <text x="470" y="362" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="bold" fill="white">δj</text>
    <text x="470" y="385" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#333">delta</text>
    <text x="470" y="395" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="#666">7×</text>
  </g>

  <!-- fraiseql-seed (left-upper) -->
  <g>
    <circle cx="130" cy="240" r="18" fill="#ed7a92" opacity="0.7"/>
    <text x="130" y="242" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="bold" fill="white">sd</text>
    <text x="130" y="265" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#333">seed</text>
    <text x="130" y="275" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="#666">300×</text>
  </g>

  <!-- fraisier (left-lower) -->
  <g>
    <circle cx="130" cy="360" r="18" fill="#ed7a92" opacity="0.7"/>
    <text x="130" y="362" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="bold" fill="white">fr</text>
    <text x="130" y="385" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#333">fraisier</text>
    <text x="130" y="395" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="#666">Deploy</text>
  </g>

  <!-- Outer Orbit Circle -->
  <circle cx="300" cy="300" r="250" fill="none" stroke="#f4a4b3" stroke-width="2" stroke-dasharray="5,5" opacity="0.3"/>
  <text x="540" y="295" font-size="11" fill="#f4a4b3" opacity="0.6" font-weight="bold">Outer Orbit</text>

  <!-- Outer Orbit Tools (Supporting) -->
  <g>
    <!-- semis -->
    <circle cx="520" cy="160" r="15" fill="#f4a4b3" opacity="0.6"/>
    <text x="520" y="165" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="white" font-weight="bold">sm</text>

    <!-- naming-police -->
    <circle cx="480" cy="80" r="15" fill="#f4a4b3" opacity="0.6"/>
    <text x="480" y="85" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="white" font-weight="bold">np</text>

    <!-- velocitybench -->
    <circle cx="350" cy="50" r="15" fill="#f4a4b3" opacity="0.6"/>
    <text x="350" y="55" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="white" font-weight="bold">vb</text>

    <!-- ecosystem -->
    <circle cx="80" cy="160" r="15" fill="#f4a4b3" opacity="0.6"/>
    <text x="80" y="165" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="white" font-weight="bold">ec</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20, 520)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#333">Performance Multipliers (Combined):</text>
    <rect x="0" y="10" width="12" height="12" fill="#e63946" opacity="0.8"/>
    <text x="18" y="20" font-size="10" fill="#333">Inner: 7-10× to 200K×</text>

    <rect x="220" y="10" width="12" height="12" fill="#ed7a92" opacity="0.7"/>
    <text x="238" y="20" font-size="10" fill="#333">Mid: 7× to 2,083×</text>
  </g>

  <!-- Combined Performance -->
  <text x="300" y="580" text-anchor="middle" font-size="13" font-weight="bold" fill="#c41f26">
    Combined: 1.2M–63M× Faster
  </text>
</svg>
