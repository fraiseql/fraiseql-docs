<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">
    FraiseQL vs Traditional GraphQL
  </text>

  <!-- Traditional GraphQL (Left) -->
  <g>
    <rect x="50" y="60" width="350" height="300" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>

    <text x="225" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">
      Traditional GraphQL
    </text>

    <!-- Per-Query Parsing -->
    <g transform="translate(70, 110)">
      <circle cx="10" cy="10" r="4" fill="#dc2626"/>
      <text x="25" y="14" font-size="11" fill="#333">Per-query parsing</text>
    </g>

    <!-- N+1 Query Risk -->
    <g transform="translate(70, 140)">
      <circle cx="10" cy="10" r="4" fill="#dc2626"/>
      <text x="25" y="14" font-size="11" fill="#333">N+1 query risk</text>
    </g>

    <!-- Resolver Chains -->
    <g transform="translate(70, 170)">
      <circle cx="10" cy="10" r="4" fill="#dc2626"/>
      <text x="25" y="14" font-size="11" fill="#333">Resolver chains</text>
    </g>

    <!-- Runtime Interpretation -->
    <g transform="translate(70, 200)">
      <circle cx="10" cy="10" r="4" fill="#dc2626"/>
      <text x="25" y="14" font-size="11" fill="#333">Runtime interpretation</text>
    </g>

    <!-- Unpredictable Performance -->
    <g transform="translate(70, 230)">
      <circle cx="10" cy="10" r="4" fill="#dc2626"/>
      <text x="25" y="14" font-size="11" fill="#333">Unpredictable performance</text>
    </g>

    <!-- Scattered Auth -->
    <g transform="translate(70, 260)">
      <circle cx="10" cy="10" r="4" fill="#dc2626"/>
      <text x="25" y="14" font-size="11" fill="#333">Scattered auth logic</text>
    </g>

    <!-- Performance Impact -->
    <rect x="70" y="300" width="230" height="40" rx="4" fill="#fff" stroke="#dc2626" stroke-width="1"/>
    <text x="185" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">
      1-2 seconds per query
    </text>
    <text x="185" y="335" text-anchor="middle" font-size="10" fill="#666">
      Latency unpredictable
    </text>
  </g>

  <!-- FraiseQL (Right) -->
  <g>
    <rect x="500" y="60" width="350" height="300" rx="8" fill="#e8f4f8" stroke="#0891b2" stroke-width="2"/>

    <text x="675" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0891b2">
      FraiseQL (Compiled)
    </text>

    <!-- Pre-Compiled Queries -->
    <g transform="translate(520, 110)">
      <circle cx="10" cy="10" r="4" fill="#0891b2"/>
      <text x="25" y="14" font-size="11" fill="#333">Pre-compiled queries</text>
    </g>

    <!-- Zero N+1 -->
    <g transform="translate(520, 140)">
      <circle cx="10" cy="10" r="4" fill="#0891b2"/>
      <text x="25" y="14" font-size="11" fill="#333">Zero N+1 queries</text>
    </g>

    <!-- Direct SQL -->
    <g transform="translate(520, 170)">
      <circle cx="10" cy="10" r="4" fill="#0891b2"/>
      <text x="25" y="14" font-size="11" fill="#333">Direct SQL execution</text>
    </g>

    <!-- Deterministic Execution -->
    <g transform="translate(520, 200)">
      <circle cx="10" cy="10" r="4" fill="#0891b2"/>
      <text x="25" y="14" font-size="11" fill="#333">Deterministic execution</text>
    </g>

    <!-- Predictable Performance -->
    <g transform="translate(520, 230)">
      <circle cx="10" cy="10" r="4" fill="#0891b2"/>
      <text x="25" y="14" font-size="11" fill="#333">Predictable performance</text>
    </g>

    <!-- Compile-Time Auth -->
    <g transform="translate(520, 260)">
      <circle cx="10" cy="10" r="4" fill="#0891b2"/>
      <text x="25" y="14" font-size="11" fill="#333">Compile-time auth metadata</text>
    </g>

    <!-- Performance Impact -->
    <rect x="520" y="300" width="230" height="40" rx="4" fill="#fff" stroke="#0891b2" stroke-width="1"/>
    <text x="635" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#0891b2">
      10-50 milliseconds per query
    </text>
    <text x="635" y="335" text-anchor="middle" font-size="10" fill="#666">
      Consistent and predictable
    </text>
  </g>

  <!-- VS Badge -->
  <circle cx="450" cy="210" r="30" fill="white" stroke="#333" stroke-width="2"/>
  <text x="450" y="220" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">VS</text>

  <!-- Performance Multiplier -->
  <g transform="translate(350, 380)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#c41f26">
      Performance Improvement: 20-200×
    </text>
  </g>
</svg>
